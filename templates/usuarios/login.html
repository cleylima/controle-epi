<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Controle EPI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                135deg,
                #0f172a,
                #1e3a8a
            );
            font-family:'Segoe UI',sans-serif;
        }

        .login-card{
            width:420px;
            border:none;
            border-radius:20px;
            padding:30px;
            background:white;
            box-shadow:
            0 15px 35px rgba(0,0,0,.2);
        }

        .logo{
            font-size:60px;
            text-align:center;
        }

        .titulo{
            text-align:center;
            font-weight:700;
            margin-bottom:5px;
        }

        .subtitulo{
            text-align:center;
            color:#6b7280;
            margin-bottom:30px;
        }

        .btn-login{
            width:100%;
            padding:12px;
            border-radius:10px;
            font-weight:600;
        }

        .rodape{
            text-align:center;
            margin-top:20px;
            color:#9ca3af;
            font-size:13px;
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="logo">
        🦺
    </div>

    <h2 class="titulo">
        Controle EPI
    </h2>

    <p class="subtitulo">
        Sistema de Gestão de Equipamentos
    </p>

    <form method="post">

        {% csrf_token %}

        {% if form.errors %}
        <div class="alert alert-danger">
            Usuário ou senha inválidos.
        </div>
        {% endif %}

        <div class="mb-3">

            <label class="form-label">
                Usuário
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Digite seu usuário">

        </div>

        <div class="mb-3">

            <label class="form-label">
                Senha
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Digite sua senha">

        </div>

        <button
            type="submit"
            class="btn btn-primary btn-login">

            Entrar

        </button>

    </form>

    <div class="rodape">

        Controle EPI v1.0

    </div>

</div>

</body>

</html>
