{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">
    Novo Usuário
</h2>

<div class="card card-modern">

    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">
                    Nome Completo
                </label>
                {{ form.first_name }}
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Usuário
                </label>
                {{ form.username }}
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Perfil
                </label>
                {{ form.grupo }}
            </div>

            <div class="mb-3">
                <label class="form-label">
                    E-mail
                </label>
                {{ form.email }}
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Senha
                </label>
                {{ form.password }}
            </div>

            <div class="form-check mb-4">
                {{ form.is_active }}
                <label class="form-check-label">
                    Usuário ativo
                </label>
            </div>

            <button
                type="submit"
                class="btn btn-success">

                Salvar

            </button>

            <a
                href="{% url 'listar_usuarios' %}"
                class="btn btn-secondary">

                Cancelar

            </a>

        </form>

    </div>

</div>

{% endblock %}
